#:schema https://yazi-rs.github.io/schemas/yazi.json

[mgr]
ratio = [1, 3, 4]
sort_by = "natural"
show_hidden = true

[plugin]
prepend_preloaders = [
  { url = "*.md", run = 'faster-piper -- glow -w=$w -s=$HOME/.config/glow/catppuccin-mocha.json "$1"' },
  { mime = "application/sqlite3", run = 'faster-piper -- sqlite3 "$1" ".schema --indent"' },
]

prepend_previewers = [
  { url = "*.md", run = "faster-piper --rely-on-preloader" },
  { mime = "application/sqlite3", run = "faster-piper --rely-on-preloader" },
  { mime = "audio/*", run = "exifaudio" },

  # Archive previewer
  { mime = "application/*zip", run = "ouch" },
  { mime = "application/x-{tar,bzip*,7z-compressed,xz,rar,iso9660-image}", run = "ouch" },
]

[[plugin.prepend_fetchers]]
group = "git"
url = "*"
run = "git"

[[plugin.prepend_fetchers]]
group = "git"
url = "*/"
run = "git"

[opener]
extract = [
  { run = 'ouch d -y "%*"', desc = "Extract here with ouch", for = "windows" },
  { run = 'ouch d -y "$@"', desc = "Extract here with ouch", for = "unix" },
]
